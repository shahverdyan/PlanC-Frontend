name: plan_c_frontend
description: "PlanC"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  dio: ^5.4.3
  http: ^1.2.1
  supabase_flutter: ^2.5.0
  google_maps_flutter: ^2.6.0
  flutter_svg: ^2.0.10+1
  uuid: ^4.4.0
  equatable: ^2.0.8

  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  mockito: ^5.6.3          
  build_runner: ^2.4.9          
  flutter_secure_storage: ^10.0.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  mime: ^1.0.5
  socket_io_client: ^3.1.4
  device_calendar: ^4.3.2
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0
  table_calendar: ^3.1.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  shared_preferences: ^2.3.0
  material_symbols_icons: ^4.2787.0
  share_plus: ^12.0.2
  flutter_time_picker_spinner: ^2.0.0
  http_parser: ^4.1.2
  path_provider: ^2.1.3
  path: ^1.9.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1 # El paquete creador de iconos

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/PlanC_Icon.png"
  remove_alpha_ios: true # Apple no permite transparencias en el icono

flutter:
  uses-material-design: true
  generate: true # Imprescindible para que autogenere las traducciones

  assets:
    - assets/images/
    - assets/icon/
    - assets/certs/
    - assets/map_style_light.json
    - assets/map_style_dark.json
  fonts:
      - family: Helvetica
        fonts: 
          - asset: assets/fonts/helvetica/Helvetica.ttf
            weight: 400
          - asset: assets/fonts/helvetica/Helvetica-Bold.ttf
            weight: 700
          - asset: assets/fonts/helvetica/Helvetica-Oblique.ttf
            style: italic
          - asset: assets/fonts/helvetica/Helvetica-BoldOblique.ttf
            weight: 700
            style: italic